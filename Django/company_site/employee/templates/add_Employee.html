{% extends "base.html" %}

{% block title %}
Employee
{% endblock %}

{% block content %}

<div class="text-center mt-5 pt-4">
    <h1 class="text-3xl font-bold text-blue-900">Add Employee</h1>
</div>

<form method="POST" class="space-y-6">
    {% csrf_token %}

    <!-- Name -->
    <div>
        <label class="block text-gray-700 font-medium mb-2">
            Name
        </label>

        <input type="text" name="name" placeholder="Enter employee name"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Department -->
    <div>
        <label class="block text-gray-700 font-medium mb-2">
            Department
        </label>

        <input type="text" name="department" placeholder="Enter department"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Salary -->
    <div>
        <label class="block text-gray-700 font-medium mb-2">
            Salary
        </label>

        <input type="number" name="salary" placeholder="Enter salary"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Status -->
    <div class="flex items-center gap-3">
        <input type="checkbox" name="status" id="status" checked
            class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">

        <label for="status" class="text-gray-700 font-medium">
            Active Employee
        </label>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end gap-4 pt-4">

        <a href="{% url 'employee:employee' %}"
            class="px-6 py-3 bg-gray-300 hover:bg-gray-400 rounded-lg font-medium transition">
            Cancel
        </a>

        <button type="submit"
            class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition active:scale-95">
            Save Employee
        </button>

    </div>

</form>

{% endblock %}
