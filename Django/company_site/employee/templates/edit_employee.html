{% extends "base.html" %}

{% block title %}
Employee
{% endblock %}

{% block content %}
    <div class="max-w-2xl mx-auto mt-10 bg-white shadow-lg rounded-xl p-8">

    <h2 class="text-3xl font-bold text-gray-800 text-center mb-8">
        Edit Employee
    </h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Name -->
        <div class="mb-5">
            <label class="block mb-2 font-medium text-gray-700">
                Name
            </label>

            <input
                type="text"
                name="name"
                value="{{ employee.name }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <!-- Department -->
        <div class="mb-5">
            <label class="block mb-2 font-medium text-gray-700">
                Department
            </label>

            <input
                type="text"
                name="department"
                value="{{ employee.department }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <!-- Salary -->
        <div class="mb-5">
            <label class="block mb-2 font-medium text-gray-700">
                Salary
            </label>

            <input
                type="number"
                step="0.01"
                name="salary"
                value="{{ employee.salary }}"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
            >
        </div>

        <!-- Status -->
        <div class="mb-8 flex items-center gap-3">

            <input
                type="checkbox"
                id="status"
                name="status"
                class="w-5 h-5"
                {% if employee.status %}checked{% endif %}
            >

            <label for="status" class="font-medium text-gray-700">
                Active Employee
            </label>

        </div>

        <!-- Buttons -->
        <div class="flex justify-end gap-4">

            <a href="{% url 'employee:employee' %}"
                class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg transition">
                Cancel
            </a>

            <button
                type="submit"
                class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2 rounded-lg transition active:scale-95">
                Update Employee
            </button>

        </div>

    </form>

</div>
{% endblock %}
