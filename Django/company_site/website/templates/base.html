{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Company{% endblock %}</title>

    {% tailwind_css %}
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-blue-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-5">
            <h1 class="text-3xl font-bold">{{ name }}</h1>

            <div class="space-x-8 text-lg">
                <a href="{% url 'website:home' %}" class="hover:text-yellow-300">Home</a>
                <a href="{% url 'website:about' %}" class="hover:text-yellow-300">About</a>
                <a href="{% url 'website:contact' %}" class="hover:text-yellow-300">Contact</a>
                <a href="{% url 'blog:blog' %}" class="hover:text-yellow-300">Blog</a>
                <a href="{% url 'employee:employee' %}" class="hover:text-yellow-300">Employee</a>
                <a href="{% url 'accounts:signup' %}" class="hover:text-yellow-300">Signup</a>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <!-- Footer -->
    <footer class="bg-gray-900 text-white mt-20">
        <div class="max-w-7xl mx-auto px-10 py-10 flex justify-between items-center">
            <h2 class="text-2xl font-bold">{{ name }}</h2>

            <p class="text-gray-400">
                © 2026 Crushaders. All Rights Reserved.
            </p>

            <div class="space-x-5">
                <a href="#" class="hover:text-yellow-300">Facebook</a>
                <a href="#" class="hover:text-yellow-300">Instagram</a>
                <a href="#" class="hover:text-yellow-300">LinkedIn</a>
            </div>
        </div>
    </footer>

</body>
</html>
